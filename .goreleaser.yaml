version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/tuto
    binary: tuto
    ldflags:
      - -s -w
      - -X github.com/codenio/tuto/internal/version.Version={{.Version}}
      - -X github.com/codenio/tuto/internal/version.Commit={{.ShortCommit}}
      - -X github.com/codenio/tuto/internal/version.Date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - modules/**

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: codenio
    name: tuto
  name_template: "v{{ .Version }}"
  footer: |
    ## Install

    ```bash
    go install github.com/codenio/tuto/cmd/tuto@{{ .Tag }}
    ```
