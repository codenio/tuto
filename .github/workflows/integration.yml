name: integration

run-name: Running integration tests for ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.24.x"
  BASE_BRANCH: main

jobs:
  integration:
    name: fmt · lint · build · test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Rebase onto ${{ env.BASE_BRANCH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${{ env.BASE_BRANCH }}"
          git rebase "origin/${{ env.BASE_BRANCH }}"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Format check
        run: |
          make fmt
          if ! git diff --exit-code; then
            echo "::error::Run 'make fmt' locally and commit the changes."
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: ./...

      - name: Build
        run: make build

      - name: Test
        run: make test
