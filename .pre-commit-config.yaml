# Install: pip install pre-commit  (or brew install pre-commit)
# Setup:   pre-commit install
# Run all: pre-commit run --all-files
#
# fmt auto-corrects and re-stages Go files before the commit completes.
# lint uses golangci-lint v2.12.2 (same as CI); installs via go run if not on PATH.

default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: fmt (make fmt)
        entry: scripts/pre-commit-fmt.sh
        language: system
        pass_filenames: false
        types: [go]

      - id: go-lint
        name: lint (golangci-lint)
        entry: scripts/pre-commit-lint.sh
        language: system
        pass_filenames: false
        types: [go]

      - id: go-build
        name: build (make build)
        entry: make build
        language: system
        pass_filenames: false
        types: [go]

      - id: go-test
        name: test (make test)
        entry: make test
        language: system
        pass_filenames: false
